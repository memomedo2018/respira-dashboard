name: Scheduled SEO Automation

on:
  schedule:
    # 09:00 Africa/Cairo during daylight saving time.
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Generate and publish daily blog article
        run: |
          curl --fail-with-body --retry 3 --retry-all-errors --retry-delay 20 --max-time 60 \
            -X POST "https://perfect-art-production.up.railway.app/api/blog/generate" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Password: ${{ secrets.RESPIRATECH_ADMIN_PASSWORD }}" \
            --data '{"count":1,"publish_now":true}'

      - name: Wait for generation thread
        run: sleep 240

      - name: Start SEO Brain in background
        run: |
          curl --fail-with-body --retry 3 --retry-all-errors --retry-delay 20 --max-time 60 \
            -X POST "https://perfect-art-production.up.railway.app/api/seo/brain" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Password: ${{ secrets.RESPIRATECH_ADMIN_PASSWORD }}" \
            --data '{"action":"full_run","async":true}'
