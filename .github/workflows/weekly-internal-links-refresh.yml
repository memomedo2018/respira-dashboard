name: Weekly Internal Links Refresh

on:
  schedule:
    # Monday 10:00 Africa/Cairo during daylight saving time.
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh internal links across all articles
        run: |
          curl --fail-with-body --retry 3 --retry-all-errors --retry-delay 30 --max-time 60 \
            -X POST "https://perfect-art-production.up.railway.app/api/cron/refresh-internal-links" \
            -H "Content-Type: application/json" \
            -H "X-Cron-Secret: ${{ secrets.RESPIRATECH_CRON_SECRET }}" \
            --data '{}'
